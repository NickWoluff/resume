# 工作流名称
name: Deploy to GitHub Pages

# 触发条件：当推送到 main 分支时执行
on:
  push:
    branches: [ "main", "master" ] # 根据你的主分支名字调整

# 设置 GitHub Pages 的读写权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许并发执行，但取消正在进行的旧任务
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm install

      - name: 打包项目
        run: npm run build

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传打包产物 (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4